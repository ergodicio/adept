solver: vlasov-2d

units:
  laser_wavelength: 351nm
  normalizing_temperature: 2000eV
  normalizing_density: 1.5e21/cc

density:
  quasineutrality: true
  species-background:
    noise_seed: 420
    noise_type: gaussian
    noise_val: 0.0
    v0x: 0.0
    v0y: 0.0
    T0: 1.0
    m: 2.0
    basis: sine
    baseline: 1.0
    amplitude: 1.0e-3
    wavenumber-x: 0.3
    wavenumber-y: 0.0

grid:
  dt: 0.1
  nx: 32
  ny: 16
  nvx: 64
  nvy: 64
  tmin: 0.0
  tmax: 60.0
  vmax: 6.0
  xmin: 0.0
  xmax: 20.94      # 2π / 0.3 ≈ box for kx0 = 0.3 mode
  ymin: -10.0
  ymax: 10.0
  parallel: false

terms:
  edfdv: exponential
  vdfdx: exponential
  fokker_planck:
    is_on: false
    type: dougherty
  krook:
    is_on: false
  hou_li_filter:
    is_on: false
    alpha: 36.0
    order: 36
    dimensions: ["x", "y"]

drivers:
  ex: {}
  ey: {}

save:
  fields:
    t:
      nt: 32
  electron:
    snapshots:
      t:
        nt: 5
      x:
        xmin: 0.0
        xmax: 20.94
        nx: 16
      y:
        ymin: -10.0
        ymax: 10.0
        ny: 8
      vx:
        vxmin: -6.0
        vxmax: 6.0
        nvx: 32
      vy:
        vymin: -6.0
        vymax: 6.0
        nvy: 32

mlflow:
  experiment: vlasov-2d-base
  run: landau-damping
