# Mixed Hermite-Legendre 1D --- Linear advection benchmark (paper sec 4.2)
#
# Pure advection (phi = 0): d_t f + v d_x f = 0, analytic f(x,v,t)=f(x-vt,v,0).
# f(x,v,0) = (1+cos x)/sqrt(2*pi) exp(-v^2/2)  ->  C_0(x,0)=(1+cos x)/sqrt(2), df=0.
# The Legendre representation of df grows to compensate Hermite recurrence (Fig 3),
# and the recurrence period matches the better of the two bases (Fig 4).

solver: hermite-legendre-1d

mlflow:
  experiment: hermite-legendre-1d
  run: linear-advection

units:
  normalizing_density: 1e20/cc
  normalizing_temperature: 1keV

physics:
  Lx: 6.283185307179586     # 2*pi
  alpha: 1.4142135623730951 # sqrt(2)
  u: 0.0
  v_a: -5.0
  v_b: 5.0
  gamma: 0.5
  nu_H: 0.0
  nu_L: 0.0
  enforce_conservation: true
  field: false              # phi = 0 : pure linear advection

grid:
  Nx: 64
  Nh: 100
  Nl: 100
  tmax: 20.0
  dt: 0.01

initialization:
  type: linear-advection
  eps: 1.0
  mode: 1

save:
  fields:
    t:
      nt: 201
  hermite:
    t:
      nt: 41
  legendre:
    t:
      nt: 41
