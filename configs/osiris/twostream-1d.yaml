solver: osiris

mlflow:
  experiment: osiris-pic1d-twostream
  run: cold-equal-beams

osiris:
  deck: tests/test_osiris/decks/two-stream-1d
  # binary omitted: the runner resolves it from OSIRIS_BIN_1D, then OSIRIS_BIN.
  # Set it here only to override that (e.g. binary: /path/to/osiris-1D.e).
  mpi_ranks: 1
  run_root: ./checkpoints
  # overrides: dict-of-dicts merged into the parsed deck before render.
  # Repeated sections (species, zpulse, ...) use integer indices.
  # overrides:
  #   time: {tmax: 5.0}
  #   species:
  #     0: {num_par_x: [1024]}

output:
  # diagnostics_to_log: [e1]   # null/omitted = convert every diagnostic's full time history to netCDF
  # v_th: 0.1                  # overlay the Langmuir (Bohm-Gross) branch on omega-k plots
  # omega_k_zoom: 4.0          # (k, omega) half-width [omega_p] for the equal-aspect lower omega-k panel; null = full
