density:
  quasineutrality: true
  species-electron-background:
    T0: 1.0
    amplitude: 0.001
    baseline: 1.0
    basis: sine
    m: 2.0
    noise_seed: 420
    noise_type: gaussian
    noise_val: 0.0
    v0: 0.0
    wavenumber: 0.1
  species-ion-background:
    T0: 0.01
    amplitude: 0.001
    baseline: 1.0
    basis: sine
    m: 2.0
    noise_seed: 421
    noise_type: gaussian
    noise_val: 0.0
    v0: 0.0
    wavenumber: 0.1
diagnostics:
  diag-fp-dfdt: false
  diag-vlasov-dfdt: false
drivers:
  ex: {}
  ey: {}
grid:
  dt: 0.5
  nx: 32
  tmax: 5000.0
  tmin: 0.0
  xmax: 314.159
  xmin: 0.0
mlflow:
  experiment: multispecies-test
  run: ion-acoustic-wave
save:
  electron:
    main:
      t:
        nt: 11
        tmax: 5000.0
        tmin: 0.0
  fields:
    t:
      nt: 1001
  ion:
    main:
      t:
        nt: 11
        tmax: 5000.0
        tmin: 0.0
solver: vlasov-1d
terms:
  edfdv: exponential
  field: poisson
  fokker_planck:
    is_on: false
    space:
      baseline: 1.0
      bump_height: 0.0
      bump_or_trough: bump
      center: 0.0
      rise: 25.0
      slope: 0.0
      width: 100000.0
    time:
      baseline: 1.0
      bump_height: 0.0
      bump_or_trough: bump
      center: 0.0
      rise: 25.0
      slope: 0.0
      width: 100000.0
    type: Dougherty
  krook:
    is_on: false
    space:
      baseline: 1.0
      bump_height: 0.0
      bump_or_trough: bump
      center: 0.0
      rise: 25.0
      slope: 0.0
      width: 100000.0
    time:
      baseline: 1.0
      bump_height: 0.0
      bump_or_trough: bump
      center: 0.0
      rise: 25.0
      slope: 0.0
      width: 100000.0
  species:
  - charge: -1.0
    density_components:
    - species-electron-background
    mass: 1.0
    name: electron
    nv: 512
    vmax: 6.4
  - charge: 10.0
    density_components:
    - species-ion-background
    mass: 18360.0
    name: ion
    nv: 256
    vmax: 0.005
  time: sixth
units:
  normalizing_density: 1.5e21/cc
  normalizing_temperature: 2000eV
