solver: vlasov-2d

units:
  normalizing_temperature: 2000eV
  normalizing_density: 1.5e21/cc

density:
  quasineutrality: true
  species-background:
    noise_seed: 1
    noise_type: none
    noise_val: 0.0
    v0x: 0.0
    v0y: 0.0
    T0: 1.0
    m: 2.0
    basis: uniform
    baseline: 1.0

grid:
  dt: 0.1
  nx: 32
  ny: 16
  nvx: 256        # fine enough to push Landau recurrence past tmax
  nvy: 64
  tmin: 0.0
  tmax: 160.0
  vmax: 6.0
  xmin: 0.0
  xmax: 20.94          # 2π / 0.3 (overridden per-test)
  ymin: -10.0
  ymax: 10.0

terms:
  edfdv: exponential
  vdfdx: exponential
  fokker_planck: {is_on: false}
  krook: {is_on: false}
  hou_li_filter: {is_on: false}

drivers:
  ex:
    "0":
      params:
        a0: 1.0e-6
        k0x: 0.3
        k0y: 0.0
        w0: 1.1598      # overridden per-test
        dw0: 0.0
      envelope:
        time:
          center: 40.0
          rise: 5.0
          width: 30.0
          baseline: 0.0
          bump_height: 1.0
        space-x:
          center: 0.0
          rise: 1.0
          width: 1000000.0
          baseline: 1.0
          bump_height: 0.0
        space-y:
          center: 0.0
          rise: 1.0
          width: 1000000.0
          baseline: 1.0
          bump_height: 0.0
      polarization: x
  ey: {}

save:
  fields:
    t: {nt: 800}

mlflow:
  experiment: test-adept-vlasov2d-landau-damping
  run: kx-0.3
