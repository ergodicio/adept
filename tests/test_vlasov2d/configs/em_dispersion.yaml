solver: vlasov-2d

units:
  normalizing_temperature: 2000eV
  normalizing_density: 1.5e21/cc

density:
  quasineutrality: true
  species-background:
    noise_seed: 1
    noise_type: none
    noise_val: 0.0
    v0x: 0.0
    v0y: 0.0
    T0: 1.0
    m: 2.0
    basis: uniform
    baseline: 1.0

grid:
  dt: 0.05            # finer dt — EM waves have ω ~ 5–8
  nx: 32
  ny: 8
  nvx: 64
  nvy: 64
  tmin: 0.0
  tmax: 20.0
  vmax: 6.0
  xmin: 0.0
  xmax: 12.566        # 2π / 0.5  (overridden per-test)
  ymin: -5.0
  ymax: 5.0

terms:
  edfdv: exponential
  vdfdx: exponential
  fokker_planck: {is_on: false}
  krook: {is_on: false}
  hou_li_filter: {is_on: false}

drivers:
  ex: {}
  ey:
    "0":
      params:
        a0: 1.0e-6
        k0x: 0.5
        k0y: 0.0
        w0: 5.7        # overridden per-test to be on/off the EM dispersion
        dw0: 0.0
      envelope:
        time:
          center: 6.0
          rise: 0.5
          width: 4.0
          baseline: 0.0
          bump_height: 1.0
        space-x:
          center: 0.0
          rise: 1.0
          width: 1000000.0
          baseline: 1.0
          bump_height: 0.0
        space-y:
          center: 0.0
          rise: 1.0
          width: 1000000.0
          baseline: 1.0
          bump_height: 0.0
      polarization: y

save:
  fields:
    t: {nt: 400}

mlflow:
  experiment: test-adept-vlasov2d-em-dispersion
  run: kx-0.5
